<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=320, initial-scale=1">
    <title>RMB - Lego</title>

    <script src="js/gsap.min.js"></script>

    <style>
        @font-face {
            font-family: "BlinkerBold";
            src: url("fonts/blinkerbold.ttf") format("truetype");
        }
            
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #banner {
            width: 320px;
            height: 480px;
            position: relative;
            overflow: hidden;
            background: #000;
            color: white;
        }

        .frame {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
        }

        .frame.show {
            display: block;
        }

        #infoFrame.show {
            display: flex;
        }

        #gameFrame.show {
            display: flex;
        }

        #loseFrame.show {
            display: flex;
        }

        #resultFrame.show {
            display: flex;
        }

        /* VIDEO */

        #videoFrame {
            background: url("media/bg-awal.jpg") center / cover no-repeat;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls {
            position: absolute;
            bottom: 48px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0;
        }

        .controls-left {
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 4px;
        }

        .controls-left div {
            width: 40px;
            height: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer;
        }

        .skip-btn {
            width: 80px;
            height: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer;
        }

        /* INFO FRAME */

        #infoFrame {
            background: url("media/bg-awal.jpg") center / cover no-repeat;
            text-align: center;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #infoFrame .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
        }

        #infoFrame .char {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 320px;
        }

        #infoFrame .title {
            width: 246px;
            margin: 100px 0 36px 0;
        }

        #infoFrame .preview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0px;
            padding: 0 30px;
            margin-bottom: 36px;
        }

        #infoFrame .preview img {
            width: 72px;
            height: 72px;
        }

        #infoFrame .preview img:nth-child(1) {
            z-index: 2;
        }

        #infoFrame .preview img:nth-child(2) {
            z-index: 1;
        }

        #infoFrame .preview img:nth-child(3) {
            z-index: 1;
        }

        #infoFrame .preview img:nth-child(4) {
            grid-column: 4;
            grid-row: 1;
            z-index: 1;
        }

        #infoFrame .preview .back-card {
            grid-column: 4;
            grid-row: 1;
            z-index: 0;
        }

        #infoFrame .start-btn {
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            margin-bottom: 10px;
        }

        #infoFrame .start-btn img {
            height: 52px;
        }

        #infoFrame .content-layer {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* GAME FRAME */

        #gameFrame {
            background: url("media/bg-game.jpg") center / cover no-repeat;
            padding: 0;
            flex-direction: column;
            overflow: hidden;
        }

        #gameFrame .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
        }

        #gameFrame .game-header {
            position: relative;
            text-align: center;
            margin: 80px 0 0 0;
            flex-shrink: 0;
        }

        #gameFrame .timer-bg {
            display: block;
            margin: auto;
            width: 140px;
        }

        #gameFrame .timer-bar {
            font-family: "BlinkerBold", sans-serif;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #E1010C;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
            padding: 0 0 6px 0;
        }

        #grid {
            margin-top: -8px;
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, auto);
            gap: 12px 12px;
            justify-content: center;
            align-content: center;
        }

        .card {
            cursor: pointer;
            transform-style: preserve-3d;
        }

        .card img {
            display: block;
            backface-visibility: hidden;
        }

        .card .front {
            position: absolute;
            top: 0;
            left: 0;
        }

        .front {
            transform: rotateY(180deg);
        }

        .matched {
            outline: 2px solid #E1010C;
        }

        /* OOPS */

        #oops {
            position: absolute;
            width: 320px;
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* LOSE */

        #loseFrame {
            background: url("media/bg-akhir.jpg") center / cover no-repeat;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #loseFrame .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
        }

        #loseFrame .title {
            width: 246px;
            margin: 0 0 16px 0;
        }

        #loseFrame .replay-btn {
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            margin-bottom: 10px;
        }

        #loseFrame .replay-btn img {
            height: 52px;
        }

        /* RESULT */

        #resultFrame {
            background: url("media/bg-akhir.jpg") center / cover no-repeat;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #resultFrame .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
        }

        #resultFrame .title-end-1 {
            width: 240px;
            margin-top: -64px;
            margin-bottom: 16px;
        }

        #resultFrame .title-end-2 {
            width: 160px;
            margin-bottom: 12px;
        }

        #resultFrame .cta {
            width: 160px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="banner">

        <!-- VIDEO FRAME -->

        <div id="videoFrame" class="frame show">

            <video id="video" autoplay muted playsinline webkit-playsinline preload="auto">
                <source src="media/intro.mp4" type="video/mp4">
            </video>

            <div class="controls">
                <div class="controls-left">
                    <div onclick="toggleMute()">
                        <img id="unmuteBtn" style="width: 70px;height: 70px;pointer-events:none;" src="media/unmute-btn.png" />
                    </div>
                    <div onclick="togglePlay()">
                        <img id="pauseBtn" style="width: 70px;height: 70px;pointer-events:none;" src="media/pause-btn.png" />
                    </div>
                </div>
                <div class="skip-btn" onclick="skipVideo()">
                    <img style="width: 120px;height: 60px;pointer-events:none;" src="media/skip-btn.png" />
                </div>
            </div>

        </div>

        <!-- INFO FRAME -->

        <div id="infoFrame" class="frame">

            <div class="content-layer">

                <img class="header" src="media/header.png">
                <img class="char" src="media/char.png">
                
                <img class="title" src="media/title.png">

                <div class="preview">
                    <img src="media/card-1.png">
                    <img src="media/card-2.png">
                    <img src="media/card-3.png">
                    <img src="media/card-4.png">
                    <img class="back-card" src="media/back-card.png">
                </div>

                <button class="start-btn" onclick="startGame()">
                    <img src="media/start-btn.png" alt="Mulai Main">
                </button>

            </div>

        </div>

        <!-- GAME FRAME -->

        <div id="gameFrame" class="frame">

            <img class="header" src="media/header.png">

            <div class="game-header">
                <img class="timer-bg" src="media/bg-countdown.png" />
                <div class="timer-bar"><span id="time">30</span> DETIK</div>
            </div>

            <div id="grid"></div>

            <img id="oops" src="media/ops.png">

        </div>

        <!-- LOSE FRAME -->

        <div id="loseFrame" class="frame">

            <img class="header" src="media/header.png">

            <img class="title" src="media/title-lose.png">

            <button class="replay-btn" onclick="restart()">
                <img src="media/replay-btn.png" alt="Main Lagi">
            </button>
        </div>

        <!-- RESULT FRAME -->

        <div id="resultFrame" class="frame">

            <img class="header" src="media/header.png">

            <img class="title-end-1" src="media/title-end-1.png">
            <img class="title-end-2" src="media/title-end-2.png">

            <img class="cta" src="media/cta.png" onclick="action()">

        </div>

    </div>

    <script>
        const images = [
            "media/card-1.png",
            "media/card-2.png",
            "media/card-3.png",
            "media/card-4.png"
        ]

        const flipSound = new Audio("media/FlipSound.mp3")
        const matchSound = new Audio("media/MatchSound.mp3")

        function playSound(audio) {
            var s = audio.cloneNode()
            s.play()
            s.onended = function() { s = null }
        }

        let first = null
        let second = null
        let lock = false
        let score = 0
        let time = 30
        let timer
        let cards = []

        const grid = document.getElementById("grid")

        function showFrame(id) {

            document.querySelectorAll(".frame").forEach(f => f.classList.remove("show"))
            document.getElementById(id).classList.add("show")

            if (id === "infoFrame") animateInfoFrame()
            if (id === "loseFrame") animateLoseFrame()
            if (id === "resultFrame") animateResultFrame()

        }

        /* INFO FRAME ANIMATION */

        function animateInfoFrame() {

            const tl = gsap.timeline()

            // Logo drops in from top
            tl.from("#infoFrame .header", {
                y: -60,
                opacity: 0,
                duration: 0.5,
                ease: "back.out(1.7)"
            })

            .from("#infoFrame .char", {
                y: 60,
                opacity: 0,
                duration: 0.5,
                ease: "back.out(1.7)"
            }, "-=0.25")

            // Title scales up with bounce
            .from("#infoFrame .title", {
                scale: 0,
                opacity: 0,
                duration: 0.5,
                ease: "back.out(2.5)"
            }, "-=0.2")

            // Preview images pop in one by one
            .fromTo(
                "#infoFrame .preview img",
                {
                    scale: 0,
                    opacity: 0,
                    rotation: -40
                },
                {
                    scale: 1,
                    opacity: 1,
                    rotation: (i) => [-12, 0, 0, 6, 9][i], // final rotation
                    x: (i) => [6, 2, -4, -12, -10][i],
                    y: (i) => [26, 0, 8, 30, -12][i], 
                    duration: 0.35,
                    stagger: 0.1,
                    ease: "back.out(2)"
                },
                "-=0.1"
            )

            // Start button bounces up, then pulse
            .from("#infoFrame .start-btn", {
                y: 40,
                opacity: 0,
                scale: 0.5,
                duration: 0.5,
                ease: "back.out(3)",
                onComplete: () => {
                    setTimeout(() => {
                        const pulse = gsap.timeline({
                            repeat: -1,
                            repeatDelay: 2   // pause 2 seconds between pulses
                        });

                        pulse.to("#infoFrame .start-btn", {
                            scale: 1.08,
                            duration: 0.3,
                            ease: "sine.out"
                        });

                        pulse.to("#infoFrame .start-btn", {
                            scale: 1,
                            duration: 0.1,
                            ease: "sine.in"
                        });
                    }, 1000)
                }
            }, "-=0.1");

        }

        /* LOSE FRAME ANIMATION */

        function animateLoseFrame() {

            // Kill any running pulse from infoFrame
            gsap.killTweensOf("#infoFrame .start-btn")

            const tl = gsap.timeline()

            .from("#loseFrame .title", {
                scale: 0,
                opacity: 0,
                duration: 0.5,
                ease: "back.out(2.5)"
            })

            // Replay button slides up
            .from("#loseFrame .replay-btn", {
                y: 40,
                opacity: 0,
                scale: 0.5,
                duration: 0.5,
                ease: "back.out(3)",
                onComplete: () => {
                    setTimeout(() => {
                        const pulse = gsap.timeline({
                            repeat: -1,
                            repeatDelay: 2   // pause 2 seconds between pulses
                        });

                        pulse.to("#loseFrame .replay-btn", {
                            scale: 1.08,
                            duration: 0.3,
                            ease: "sine.out"
                        });

                        pulse.to("#loseFrame .replay-btn", {
                            scale: 1,
                            duration: 0.1,
                            ease: "sine.in"
                        });
                    }, 1000)
                }
            }, "-=0.1")
        }

        /* RESULT FRAME ANIMATION */

        function animateResultFrame() {

            // Kill any running pulse from infoFrame
            gsap.killTweensOf("#infoFrame .start-btn")

            const tl = gsap.timeline()

            tl.from("#resultFrame .title-end-1", {
                y: -60,
                opacity: 0,
                duration: 0.5,
                ease: "back.out(1.7)"
            })

            .from("#resultFrame .title-end-2", {
                scale: 0,
                opacity: 0,
                duration: 0.5,
                ease: "back.out(2.5)"
            }, "-=0.2")

            // CTA link fades in
            .from("#resultFrame .cta", {
                y: 20,
                opacity: 0,
                duration: 0.4,
                ease: "power2.out",
                onComplete: () => {
                    setTimeout(() => {
                        const pulse = gsap.timeline({
                            repeat: -1,
                            repeatDelay: 2   // pause 2 seconds between pulses
                        });

                        pulse.to("#resultFrame .cta", {
                            scale: 1.08,
                            duration: 0.3,
                            ease: "sine.out"
                        });

                        pulse.to("#resultFrame .cta", {
                            scale: 1,
                            duration: 0.1,
                            ease: "sine.in"
                        });
                    }, 1000)
                }
            }, "-=0.1")

        }

        /* VIDEO */

        const video = document.getElementById("video")

        video.onended = () => showFrame("infoFrame")

        video.addEventListener("volumechange", updateMuteButton)
        video.addEventListener("play", updatePlayButton)
        video.addEventListener("pause", updatePlayButton)
        video.addEventListener("loadedmetadata", () => {
            updateMuteButton()
            updatePlayButton()
        })

        function updateMuteButton() {
            const btn = document.getElementById("unmuteBtn")

            if (video.muted) {
                btn.src = "media/unmute-btn.png"
            } else {
                btn.src = "media/mute-btn.png"
            }
        }

        function updatePlayButton() {
            const btn = document.getElementById("pauseBtn")

            if (video.paused) {
                btn.src = "media/play-btn.png"
            } else {
                btn.src = "media/pause-btn.png"
            }
        }

        function toggleMute() {
            video.muted = !video.muted
        }

        function togglePlay() {
            if (video.paused) {
                video.play()
            } else {
                video.pause()
            }
        }

        function skipVideo() {
            video.pause()
            showFrame("infoFrame")
        }

        /* SHUFFLE */

        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]]
            }
        }

        /* BUILD BOARD */

        function buildBoard() {

            grid.innerHTML = ""

            cards = [...images, ...images]

            shuffle(cards)

            cards.forEach(src => {

                const card = document.createElement("div")

                card.className = "card"
                card.dataset.src = src
                card.rotation = 0

                card.innerHTML = `
                <img class="back" style="width: 76px;height: 76px;" src="media/back-card.png">
                <img class="front" style="width: 76px;height: 76px;" src="${src}">
                `

                card.onclick = () => flip(card)

                grid.appendChild(card)

            })

            gsap.from(".card", {
                scale: 0,
                duration: .4,
                stagger: .05,
                ease: "back.out(1.7)"
            })

        }

        /* FLIP CARD */

        function flip(card) {

            if (lock) return
            if (card === first) return
            if (card.classList.contains("matched")) return

            playSound(flipSound)

            gsap.to(card, {
                rotationY: 180,
                duration: .4,
                ease: "power2.out"
            })

            if (!first) {
                first = card
                return
            }

            second = card

            checkMatch()

        }

        /* CHECK MATCH */

        function checkMatch() {

            if (first.dataset.src === second.dataset.src) {

                gsap.to([first, second], {
                    scale: 1.15,
                    duration: .2,
                    yoyo: true,
                    repeat: 1
                })

                first.classList.add("matched")
                second.classList.add("matched")

                playSound(matchSound)

                score++

                resetPair()

                if (score === 4) {
                    lock = true
                    setTimeout(winGame, 400)
                }

            } else {

                lock = true

                setTimeout(() => {

                    showOops()

                }, 400)

                setTimeout(() => {

                    gsap.to(first, { rotationY: 0, duration: .4 })
                    gsap.to(second, { rotationY: 0, duration: .4 })

                    resetPair()

                }, 800)

            }

        }

        function resetPair() {
            [first, second, lock] = [null, null, false]
        }

        /* OOPS ANIMATION */

        function showOops() {

            const el = document.getElementById("oops")

            gsap.fromTo(el,
                { scale: 0.5, opacity: 0 },
                {
                    scale: 1.3,
                    opacity: 1,
                    duration: .3,
                    ease: "back.out(3)",
                    onComplete: () => {
                        gsap.to(el, {
                            opacity: 0,
                            scale: 0.8,
                            delay: .4,
                            duration: .3
                        })
                    }
                })

        }

        /* TIMER */

        function startTimer() {

            timer = setInterval(() => {

                time--

                document.getElementById("time").textContent = time

                if (time <= 0) {
                    loseGame()
                }

            }, 1000)

        }

        /* START GAME */

        function startGame() {

            showFrame("gameFrame")

            score = 0
            time = 30

            document.getElementById("time").textContent = 30

            buildBoard()

            startTimer()

        }

        /* WIN */

        function winGame() {

            clearInterval(timer)

            showFrame("resultFrame")

        }

        /* LOSE */

        function loseGame() {

            clearInterval(timer)

            showFrame("loseFrame")

        }

        /* RESTART */

        function restart() {

            showFrame("gameFrame")

            score = 0
            time = 30
            first = null
            second = null
            lock = false

            document.getElementById("time").textContent = 30

            buildBoard()

            startTimer()

        }

        function action() {
            const url = typeof clickTag !== "undefined"
                ? clickTag
                : "https://example.com";

            window.open(url, "_blank");
        }

    </script>

</body>

</html>
