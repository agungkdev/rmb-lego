<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=320, initial-scale=1">
    <title>RMB - Lego</title>

    <script src="js/gsap.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #banner {
            width: 320px;
            height: 480px;
            position: relative;
            overflow: hidden;
            background: #000;
            color: white;
        }

        .frame {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
        }

        .frame.show {
            display: block;
        }

        #infoFrame.show {
            display: flex;
        }

        #gameFrame.show {
            display: flex;
        }

        #resultFrame.show {
            display: flex;
        }

        /* VIDEO */

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls {
            position: absolute;
            bottom: 48px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0;
        }

        .controls-left {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .controls-left button {
            background: none;
            border: none;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 8px 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .controls-left .separator {
            color: white;
            font-size: 11px;
            font-weight: bold;
            user-select: none;
        }

        .skip-btn {
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            font-size: 14px;
            font-weight: bold;
            padding: 8px 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* INFO FRAME */

        #infoFrame {
            background: #FEE451;
            text-align: center;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #infoFrame .lego-logo {
            position: absolute;
            top: 18px;
            left: 18px;
        }

        #infoFrame h2 {
            font-size: 24px;
            font-weight: 900;
            color: #000;
            margin: 96px 0 0 0;
            letter-spacing: 1px;
        }

        #infoFrame .subtitle {
            font-size: 10px;
            font-weight: 800;
            color: #000;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        #infoFrame .preview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 0 30px;
            margin-bottom: 20px;
        }

        #infoFrame .preview img {
            width: 100%;
            height: 64px;
        }

        #infoFrame .start-btn {
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            margin-bottom: 10px;
        }

        #infoFrame .content-layer {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* GAME FRAME */

        #gameFrame {
            background: #FEE451;
            padding: 0;
            flex-direction: column;
            overflow: hidden;
        }

        #gameFrame .game-header {
            text-align: center;
            padding: 12px 0 4px 0;
            flex-shrink: 0;
        }

        #gameFrame .timer-bar {
            margin: auto;
            width: 40%;
            background: #000;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 1px;
            padding: 6px 8px;
        }

        #gameFrame .game-title {
            color: #000;
            font-size: 16px;
            font-weight: 800;
            margin: 8px 0 2px 0;
        }

        #gameFrame .game-subtitle {
            color: #000;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        #grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, auto);
            gap: 16px 42px;
            justify-content: center;
            align-content: center;
            padding: 8px 16px;
            margin-bottom: 16px;
        }

        .card {
            cursor: pointer;
            transform-style: preserve-3d;
        }

        .card img {
            display: block;
            backface-visibility: hidden;
        }

        .card .front {
            position: absolute;
            top: 0;
            left: 0;
        }

        .front {
            transform: rotateY(180deg);
        }

        .matched {
            outline: 3px solid #E1010C;
        }

        /* OOPS */

        #oops {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* RESULT */

        #resultFrame {
            background: #FEE451;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #resultFrame h2 {
            font-size: 32px;
            font-weight: 900;
            color: #4CAF50;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        #resultFrame .replay-btn {
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            margin-bottom: 24px;
        }

        #resultFrame .replay-btn img {
            height: 40px;
        }

        #resultFrame .cta-link {
            display: inline-block;
            color: #000;
            font-size: 12px;
            font-weight: 700;
            text-decoration: underline;
            cursor: pointer;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <div id="banner">

        <!-- VIDEO FRAME -->

        <div id="videoFrame" class="frame show">

            <video id="video" autoplay muted playsinline webkit-playsinline>
                <source src="media/320x480.mp4" type="video/mp4">
            </video>

            <div id="videoOverlay" style="position:absolute;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);cursor:pointer;z-index:5">
                <span style="color:#fff;font-size:18px;font-weight:bold">TAP TO PLAY</span>
            </div>

            <div class="controls">
                <div class="controls-left">
                    <button onclick="toggleMute()">MUTE</button>
                    <span class="separator">|</span>
                    <button onclick="togglePlay()">PAUSE</button>
                </div>
                <button class="skip-btn" onclick="skipVideo()">SKIP</button>
            </div>

        </div>

        <!-- INFO FRAME -->

        <div id="infoFrame" class="frame">

            <div class="content-layer">

                <img class="lego-logo" src="media/logo.jpg">
                
                <h2>MEMORY GAME</h2>
                <p class="subtitle">COCOKKAN GAMBAR-GAMBAR DIBAWAH INI</p>

                <div class="preview">
                    <img src="media/a.png">
                    <img src="media/b.png">
                    <img src="media/c.png">
                    <img src="media/d.png">
                </div>

                <button class="start-btn" onclick="startGame()">
                    <img src="media/start-btn.png" alt="Mulai Main">
                </button>

            </div>

        </div>

        <!-- GAME FRAME -->

        <div id="gameFrame" class="frame">

            <div class="game-header">
                <div class="timer-bar"><span id="time">60</span> DETIK</div>
                <div class="game-title">MEMORY GAME</div>
                <div class="game-subtitle">COCOKKAN GAMBAR-GAMBAR DIBAWAH INI</div>
            </div>

            <div id="grid"></div>

            <img id="oops" src="media/oops.png">

        </div>

        <!-- RESULT FRAME -->

        <div id="resultFrame" class="frame">

            <h2 id="resultText"></h2>

            <button class="replay-btn" onclick="restart()">
                <img src="media/replay-btn.png" alt="Main Lagi">
            </button>

            <a class="cta-link" href="https://www.lego.com" target="_blank">Kunjungi LEGO.com</a>

        </div>

    </div>

    <script>

        const images = [
            "media/a.png",
            "media/b.png",
            "media/c.png",
            "media/d.png"
        ]

        const flipSound = new Audio("media/FlipSound.mp3")
        const matchSound = new Audio("media/MatchSound.mp3")

        let first = null
        let second = null
        let lock = false
        let score = 0
        let time = 60
        let timer
        let cards = []

        const grid = document.getElementById("grid")

        function showFrame(id) {

            document.querySelectorAll(".frame").forEach(f => f.classList.remove("show"))
            document.getElementById(id).classList.add("show")

            if (id === "infoFrame") animateInfoFrame()
            if (id === "resultFrame") animateResultFrame()

        }

        /* INFO FRAME ANIMATION */

        function animateInfoFrame() {

            const tl = gsap.timeline()

            // Logo drops in from top
            tl.from("#infoFrame .lego-logo", {
                y: -60,
                opacity: 0,
                duration: 0.5,
                ease: "back.out(1.7)"
            })

            // Title scales up with bounce
            .from("#infoFrame h2", {
                scale: 0,
                opacity: 0,
                duration: 0.5,
                ease: "back.out(2.5)"
            }, "-=0.2")

            // Subtitle slides in from right
            .from("#infoFrame .subtitle", {
                x: 80,
                opacity: 0,
                duration: 0.4,
                ease: "power2.out"
            }, "-=0.15")

            // Preview images pop in one by one
            .from("#infoFrame .preview img", {
                scale: 0,
                opacity: 0,
                rotation: -15,
                duration: 0.35,
                stagger: 0.1,
                ease: "back.out(2)"
            }, "-=0.1")

            // Start button bounces up, then pulse
            .from("#infoFrame .start-btn", {
                y: 40,
                opacity: 0,
                scale: 0.5,
                duration: 0.5,
                ease: "back.out(3)",
                onComplete: () => {
                    setTimeout(() => {
                        const pulse = gsap.timeline({
                            repeat: -1,
                            repeatDelay: 2   // pause 2 seconds between pulses
                        });

                        pulse.to("#infoFrame .start-btn", {
                            scale: 1.08,
                            duration: 0.3,
                            ease: "sine.out"
                        });

                        pulse.to("#infoFrame .start-btn", {
                            scale: 1,
                            duration: 0.1,
                            ease: "sine.in"
                        });
                    }, 1000)
                }
            }, "-=0.1");

        }

        /* RESULT FRAME ANIMATION */

        function animateResultFrame() {

            // Kill any running pulse from infoFrame
            gsap.killTweensOf("#infoFrame .start-btn")

            const tl = gsap.timeline()

            // Result text drops in with bounce
            tl.from("#resultText", {
                scale: 0,
                opacity: 0,
                duration: 0.6,
                ease: "back.out(2.5)"
            })

            // Replay button slides up
            .from("#resultFrame .replay-btn", {
                y: 40,
                opacity: 0,
                scale: 0.5,
                duration: 0.5,
                ease: "back.out(3)",
                onComplete: () => {
                    setTimeout(() => {
                        const pulse = gsap.timeline({
                            repeat: -1,
                            repeatDelay: 2   // pause 2 seconds between pulses
                        });

                        pulse.to("#resultFrame .replay-btn", {
                            scale: 1.08,
                            duration: 0.3,
                            ease: "sine.out"
                        });

                        pulse.to("#resultFrame .replay-btn", {
                            scale: 1,
                            duration: 0.1,
                            ease: "sine.in"
                        });
                    }, 1000)
                }
            }, "-=0.1")

            // CTA link fades in
            .from("#resultFrame .cta-link", {
                y: 20,
                opacity: 0,
                duration: 0.4,
                ease: "power2.out"
            }, "-=0.1")

        }

        /* VIDEO */

        const video = document.getElementById("video")
        const videoOverlay = document.getElementById("videoOverlay")

        video.onended = () => showFrame("infoFrame")

        // Safari autoplay fix
        var playAttempt = video.play()
        if (playAttempt !== undefined) {
            playAttempt.catch(function() {
                videoOverlay.style.display = "flex"
                videoOverlay.onclick = function() {
                    videoOverlay.style.display = "none"
                    video.play()
                }
            })
        }

        function toggleMute() {
            video.muted = !video.muted
        }

        function togglePlay() {
            if (video.paused) video.play()
            else video.pause()
        }

        function skipVideo() {
            video.pause()
            showFrame("infoFrame")
        }

        /* SHUFFLE */

        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]]
            }
        }

        /* BUILD BOARD */

        function buildBoard() {

            grid.innerHTML = ""

            cards = [...images, ...images]

            shuffle(cards)

            cards.forEach(src => {

                const card = document.createElement("div")

                card.className = "card"
                card.dataset.src = src
                card.rotation = 0

                card.innerHTML = `
                <img class="back" src="media/back.png">
                <img class="front" src="${src}">
                `

                card.onclick = () => flip(card)

                grid.appendChild(card)

            })

            gsap.from(".card", {
                scale: 0,
                duration: .4,
                stagger: .05,
                ease: "back.out(1.7)"
            })

        }

        /* FLIP CARD */

        function flip(card) {

            if (lock) return
            if (card === first) return
            if (card.classList.contains("matched")) return

            flipSound.currentTime = 0
            flipSound.play()

            gsap.to(card, {
                rotationY: 180,
                duration: .4,
                ease: "power2.out"
            })

            if (!first) {
                first = card
                return
            }

            second = card

            checkMatch()

        }

        /* CHECK MATCH */

        function checkMatch() {

            if (first.dataset.src === second.dataset.src) {

                gsap.to([first, second], {
                    scale: 1.15,
                    duration: .2,
                    yoyo: true,
                    repeat: 1
                })

                first.classList.add("matched")
                second.classList.add("matched")

                matchSound.currentTime = 0
                matchSound.play()

                score++

                resetPair()

                if (score === 4) {
                    lock = true
                    setTimeout(winGame, 400)
                }

            } else {

                lock = true

                setTimeout(() => {

                    showOops()

                }, 400)

                setTimeout(() => {

                    gsap.to(first, { rotationY: 0, duration: .4 })
                    gsap.to(second, { rotationY: 0, duration: .4 })

                    resetPair()

                }, 800)

            }

        }

        function resetPair() {
            [first, second, lock] = [null, null, false]
        }

        /* OOPS ANIMATION */

        function showOops() {

            const el = document.getElementById("oops")

            gsap.fromTo(el,
                { scale: 0.5, opacity: 0 },
                {
                    scale: 1.3,
                    opacity: 1,
                    duration: .3,
                    ease: "back.out(3)",
                    onComplete: () => {
                        gsap.to(el, {
                            opacity: 0,
                            scale: 0.8,
                            delay: .4,
                            duration: .3
                        })
                    }
                })

        }

        /* TIMER */

        function startTimer() {

            timer = setInterval(() => {

                time--

                document.getElementById("time").textContent = time

                if (time <= 0) {
                    loseGame()
                }

            }, 1000)

        }

        /* START GAME */

        function startGame() {

            showFrame("gameFrame")

            score = 0
            time = 60

            document.getElementById("time").textContent = 60

            buildBoard()

            startTimer()

        }

        /* WIN */

        function winGame() {

            clearInterval(timer)

            document.getElementById("resultText").innerText = "ANDA MENANG!"

            showFrame("resultFrame")

        }

        /* LOSE */

        function loseGame() {

            clearInterval(timer)

            document.getElementById("resultText").innerText = "ANDA KALAH!"

            showFrame("resultFrame")

        }

        /* RESTART */

        function restart() {

            showFrame("gameFrame")

            score = 0
            time = 60

            document.getElementById("time").textContent = 60

            buildBoard()

            startTimer()

        }

    </script>

</body>

</html>
